# Type-check the JS on every push / PR. Dev-only: this runs on GitHub's
# servers and never touches what's deployed — it just enforces the
# // @ts-check + JSDoc types that an editor would otherwise check by hand.
name: check

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Type-check
        run: make check
